# Configure catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_pane_border_status "off"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Use vi key bindings in copy mode
set -g mode-keys vi

# Don't start a login shell
set -g default-command "${SHELL}"

# Status line
set -g status-interval 5
set -g status-justify "absolute-centre"
set -g status-position "top"
set -g status-style "bg=#{@thm_bg}"

# Status left
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{b:pane_current_path} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status right
set -g status-right-length 100
set -g status-right ""
set -gaF status-right "#[bg=#{@thm_bg},fg=#{@thm_peach}] 󰔟#{@catppuccin_uptime_text} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Pane setup
set -g pane-base-index 1
set -g pane-border-format ""
set -g pane-border-indicators "arrows"
set -g pane-border-lines "single"
set -g pane-border-status "top"
set -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
set -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"

# Window setup
set -g automatic-rename on
set -g automatic-rename-format "Window"
set -g base-index 1
set -g renumber-windows on

# Window format
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

# Window style
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"

# Popup style
set -g popup-border-style "fg=#{@thm_yellow}"
set -g popup-border-lines "rounded"

# Mouse
set -g mouse on

# Windows and pane splits should start in the same directory
bind c new-window -c "#{pane_current_path}"
bind - split-window -h -c "#{pane_current_path}"
bind | split-window -v -c "#{pane_current_path}"

# General binds
bind g display-popup -E -w 90% -h 90% "lazygit"
bind r source ~/.config/tmux/tmux.conf \; display "Reloaded"
